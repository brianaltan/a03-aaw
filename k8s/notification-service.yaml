apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: suilens-2306152166
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: brianaltan/suilens-notification-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: DATABASE_URL
              value: postgres://notifications:notifications@notification-db:5432/notifications
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: suilens-2306152166
spec:
  type: NodePort
  selector:
    app: notification-service
  ports:
    - port: 3003
      targetPort: 3003
      nodePort: 30003
