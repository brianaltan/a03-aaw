apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: suilens-2306152166
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: brianaltan/suilens-catalog-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: postgres://catalog:catalog@catalog-db:5432/catalog
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: suilens-2306152166
spec:
  type: NodePort
  selector:
    app: catalog-service
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001
